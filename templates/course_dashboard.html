<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI";
      display: flex;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #34495e;
    }

    /* Main */
    .main {
      margin-left: 250px;
      padding: 30px;
      width: 100%;
    }

    .header {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #3498db;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }

    .btn:hover {
      background: #2980b9;
    }

    .success {
      color: green;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>📘 Study App</h2>
  <a href="#">🏠 Dashboard</a>
  <a href="#">📚 Courses</a>
  <a href="#">💬 Chat</a>
  <a href="#">📄 Notes</a>
</div>

<!-- Main -->
<div class="main">

  <div class="header">
    Welcome, {{ name }} 👋
  </div>

  {% if request.args.get('success') %}
    <div class="success">✅ Enrolled successfully!</div>
  {% endif %}

  <div class="card-container">
    {% for course in courses %}
      <div class="card">
        <h3>{{ course }}</h3>

        <a class="btn" href="{{ url_for('notes', course_name=course) }}">📄 Notes</a>
        <a class="btn" href="{{ url_for('course_chat', course_name=course) }}">💬 Chat</a>
      </div>
    {% endfor %}
  </div>

</div>

</body>
</html>
