<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recommended Course</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h2>✅ Recommended Course: <span class="highlight">{{ course }}</span></h2>
    
    <form action="{{ url_for('enroll') }}" method="POST">
      <input type="hidden" name="course" value="{{ course }}">
      <input type="text" name="student_name" placeholder="Enter Your Name" required>
      <button type="submit">Enroll Now</button>
    </form>
    
    
    
  </div>
</body>
</html>
