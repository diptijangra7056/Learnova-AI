<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Tutor – {{ course_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f0f2f5;
    }
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 1rem;
    }
    .sidebar h5 {
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .chat-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .chat-list li {
      margin-bottom: 0.5rem;
    }
    .chat-list a {
      display: block;
      padding: 0.5rem 0.75rem;
      background: #f8f9fa;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: background 0.2s;
    }
    .chat-list a:hover {
      background: #e9ecef;
    }

    /* Chat container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      background: #007bff;
      color: white;
      padding: 1rem;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 1rem;
      display: flex;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message.assistant {
      justify-content: flex-start;
    }
    .bubble {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      word-wrap: break-word;
    }
    .user .bubble {
      background: #007bff;
      color: white;
      border-bottom-right-radius: 0.3rem;
    }
    .assistant .bubble {
      background: #e4e6eb;
      color: #111;
      border-bottom-left-radius: 0.3rem;
    }
    .chat-input {
      display: flex;
      padding: 0.75rem;
      border-top: 1px solid #ddd;
      background: #fff;
    }
    .chat-input input {
      flex: 1;
      border-radius: 20px;
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      outline: none;
    }
    .chat-input button {
      margin-left: 0.5rem;
      border-radius: 50%;
      padding: 0.5rem 0.75rem;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    .chat-input button:hover {
      background: #0056b3;
    }
    .chat-input .mic-btn {
      background: #28a745;
    }
    .chat-input .mic-btn:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h5>Previous Chats</h5>
    <ul class="chat-list">
      {% for chat in previous_chats %}
        <li>
          <a href="{{ url_for('load_chat', course_name=course_name, chat_index=loop.index0) }}">
            {{ chat.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
    <hr>
    <a href="{{ url_for('new_chat', course_name=course_name) }}" class="btn btn-sm btn-success w-100 mb-2">+ New Chat</a>
    <a href="{{ url_for('save_chat', course_name=course_name) }}" class="btn btn-sm btn-secondary w-100">💾 Save Chat</a>
  </div>

  <!-- Chat Area -->
  <div class="chat-container">
    <div class="chat-header">
      📘 AI Tutor – {{ course_name }}
    </div>
    <div class="messages" id="chat-box">
      {% for msg in current_chat %}
        <div class="message {{ msg.role }}">
          <div class="bubble">
            {{ msg.content }}
          </div>
        </div>
      {% endfor %}
    </div>
    <form class="chat-input" method="POST">
      <input type="text" name="query" placeholder="Type your question..." autocomplete="off">
      <button type="submit">➤</button>
      <!-- 🎤 Voice Input Button -->
      <button type="submit" name="query" value="" class="mic-btn">🎤</button>
    </form>
  </div>

  <script>
    // Auto-scroll to latest message
    const chatBox = document.getElementById("chat-box");
    chatBox.scrollTop = chatBox.scrollHeight;
  </script>
</body>
</html>
